User daemon
Group daemon
Port 8888
# Mandatory HTTP proxy endpoint for this container.
PidFile "/var/run/tinyproxy/tinyproxy.pid"
LogFile "/var/log/tinyproxy/tinyproxy.log"
Timeout 600
# Keep a conservative worker profile by default.
LogLevel Info
StartServers 1
MinSpareServers 1
MaxSpareServers 2
MaxClients 256
Allow 0.0.0.0/0
Allow ::/0
